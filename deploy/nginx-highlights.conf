# Reverse proxy for Extra Time on highlights.tvflix.co.uk
# Install: copy to /etc/nginx/sites-available/highlights.tvflix.co.uk
#          ln -s .../highlights.tvflix.co.uk /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

server {
	listen 80;
	listen [::]:80;
	server_name highlights.tvflix.co.uk;

	# Certbot: certbot --nginx -d highlights.tvflix.co.uk
	# Or terminate TLS elsewhere and proxy to this block on 443.

	location / {
		proxy_pass http://127.0.0.1:7000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

# After certbot, it typically adds a second server { listen 443 ssl; ... } block.
